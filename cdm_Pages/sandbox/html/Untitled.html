---
header: true
footer: true
title: Template to emulate a landing page
---
<div class="CollectionLayout-container">
    <div class="CollectionLanding-maincontainer shared-box">
        <div class="CollectionLanding-maincontentLanding shared-contentContainer">

            <div class="homepage-box">
                <div class="searchbox-wrapper" style="background-color: #3e3e3e8f; padding: 25px; border-radius: 5px">
                    <p class="intro">Explore over 150,000 digitized items from <a href="https://library.wayne.edu">Wayne
                            State University Library System</a> collections</p>

                    <form id="collection-search" method="get"
                        action="https://wayne.contentdm.oclc.org/cdm4/results.php">

                        <input type="hidden" name="CISOOP1" value="all">
                        <input type="hidden" name="CISOFIELD1" value="CISOSEARCHALL">
                        <input type="hidden" name="CISORESTMP" value="results.php">
                        <input type="hidden" name="CISOVIEWTMP" value="item_viewer.php">
                        <input type="hidden" name="CISOMODE" value="grid">
                        <!-- <input type="hidden" name="CISOGRID" value="thumbnail,A,1;title,A,1;date,A,0;none,200,0;none,A,0;20;title,date,none,none,none"> -->
                        <input type="hidden" name="CISOGRID"
                            value="thumbnail,A,1;title,A,1;date,A,0;none,200,0;none,A,0;20;relevance,none,none,none">
                        <input type="hidden" name="CISOBIB"
                            value="creato,A,1,N;title,A,0,N;titla,200,0,N;none,A,0,N;none,A,0,N;20;creato,none,none,none,none">
                        <input type="hidden" name="CISOTHUMB" value="20 (4x5);creato,none,none,none,none">
                        <input type="hidden" name="CISOTITLE" value="20;creato,none,none,none,none">
                        <input type="hidden" name="CISOHIERA" value="20;title,creato,none,none,none">
                        <input type="hidden" name="CISOSUPPRESS" value="0">

                        <div class="search-input-container">
                            <input type="text" name="CISOBOX1" class="collection-search-input" autocomplete="off"
                                placeholder="Search all collections, images, documents and more">
                            <button class="button" id="frm-search-button" type="submit"><i aria-label="search"
                                    class="fa fa-search"></i></button>
                        </div>
                    </form>
                </div>
                <div class="container" id="recent-items">
                    <div class="row collection-title" id="collectionTitle"></div>
                    <div class="row list-group-wrapper">
                        <ul style="display: flex" class="list-group list-unstyled" id="imageList"></ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
